name: Vexta CI

permissions:
  contents: read

concurrency:
  group: vexta-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1
  HOST: x86_64-pc-linux-gnu

jobs:
  ubuntu-build:
    name: Ubuntu build smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            pkg-config \
            python3 \
            git \
            curl \
            ca-certificates

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/sdk-sources
            depends/sources
            depends/work
            depends/${{ env.HOST }}
          key: vexta-depends-${{ runner.os }}-${{ env.HOST }}-${{ hashFiles('depends/**') }}
          restore-keys: |
            vexta-depends-${{ runner.os }}-${{ env.HOST }}-

      - name: Build project dependencies
        run: |
          make -C depends \
            HOST="${HOST}" \
            NO_QT=1 \
            NO_UPNP=1 \
            NO_NATPMP=1 \
            -j2

      - name: Generate configure script
        run: ./autogen.sh

      - name: Configure
        run: |
          CONFIG_SITE="$PWD/depends/${HOST}/share/config.site" \
          ./configure \
            --without-gui \
            --disable-bench \
            --disable-tests

      - name: Build
        run: make -j2

      - name: Verify Vexta binaries
        run: |
          ./src/vextad --version
          ./src/vexta-cli --version
          ./src/vexta-tx --version
          ./src/vexta-util --version
          ./src/vexta-wallet --version || test $? -eq 1

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vexta-test-logs
          path: |
            src/test-suite.log
            test/tmp/**
          if-no-files-found: ignore
